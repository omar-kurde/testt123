spring.application.name=backend

# =====================
# PostgreSQL
# =====================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:smartcity}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:wadea1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Redis
# =====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.ssl.enabled=false

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET:smartcity-super-secret-key-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =====================
# Server
# =====================
server.port=${SERVER_PORT:8080}